<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Miss Catering</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body data-title="Admin">
  <header class="site-header" data-header></header>

  <main class="admin-layout">
    <div class="container">
      <div id="admin-gate" class="admin-box" hidden>
        <h1>Admin Hinweis</h1>
        <div id="admin-status"></div>
      </div>

      <div id="admin-app" hidden>
        <div class="admin-box">
          <div style="display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap">
            <h1>Admin Dashboard</h1>
            <button id="logoutBtn" class="btn btn-secondary">Logout</button>
          </div>
          <p>Hier bearbeitest du jetzt die Inhalte direkt in Supabase.</p>
        </div>

        <section class="admin-box">
          <h2>Über uns</h2>
          <textarea id="about-de" rows="4" placeholder="Deutsch"></textarea>
          <textarea id="about-en" rows="4" placeholder="English"></textarea>
          <textarea id="about-tr" rows="4" placeholder="Türkçe"></textarea>
          <button id="saveAboutBtn" class="btn btn-primary">Über uns speichern</button>
        </section>

        <section class="admin-box">
          <h2>Kontakt</h2>
          <input id="contact-address" type="text" placeholder="Adresse">
          <input id="contact-phone" type="text" placeholder="Telefon">
          <input id="contact-mail" type="email" placeholder="E-Mail">
          <button id="saveContactBtn" class="btn btn-primary">Kontakt speichern</button>
        </section>

        <section class="admin-box">
          <h2>Impressum</h2>
          <input id="impressum-company" type="text" placeholder="Firma">
          <input id="impressum-owner" type="text" placeholder="Inhaber">
          <input id="impressum-street" type="text" placeholder="Straße">
          <input id="impressum-city" type="text" placeholder="Ort">
          <input id="impressum-mail" type="email" placeholder="E-Mail">
          <input id="impressum-phone" type="text" placeholder="Telefon">
          <button id="saveImpressumBtn" class="btn btn-primary">Impressum speichern</button>
        </section>

        <section class="admin-box">
          <h2>Pakete (Vorschau)</h2>
          <div id="packages-preview"></div>
        </section>

        <section class="admin-box">
          <h2>Bestellarchiv</h2>
          <div id="orders-list"></div>
        </section>

        <section class="admin-box">
          <p id="admin-message"></p>
        </section>
      </div>
    </div>
  </main>

  <footer class="site-footer" data-footer></footer>

  <script type="module" src="assets/js/app.js"></script>
  <script type="module" src="assets/js/admin.js"></script>
</body>
</html>
