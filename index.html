<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miss Catering</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-title="Startseite">
  <header class="site-header" data-header></header>

  <main class="page-shell">
    <section class="section">
      <div class="container">
        <div class="premium-home-grid" id="home-sections"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer" data-footer></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="assets/js/app.js"></script>

  <script type="module">
    import { loadSiteData, pickLang } from "./assets/js/data.js";

    const data = await loadSiteData();
    const sections = data.homeSections || [];
    const grid = document.querySelector("#home-sections");

    grid.innerHTML = sections.map(item => `
      <article class="premium-home-card">
        <div class="premium-home-image">
          <img src="${item.image || ""}" alt="${pickLang(item.title)}">
        </div>
        <div class="premium-home-content">
          <h3>${pickLang(item.title)}</h3>
          <p>${pickLang(item.text)}</p>
          <a class="btn btn-primary" href="${item.link || '#'}">${pickLang(item.button)}</a>
        </div>
      </article>
    `).join("");
  </script>
</body>
</html>
