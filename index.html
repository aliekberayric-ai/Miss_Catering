<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miss Catering</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-title="Startseite">
  <header class="site-header" data-header></header>

  <main class="page-shell">
    <section class="hero section">
      <div class="container">
        <span class="hero-badge" id="hero-badge"></span>
        <h1 class="hero-title" id="hero-title"></h1>
        <p class="hero-text" id="hero-text"></p>

        <div class="hero-actions">
          <a class="btn btn-primary" href="packages.html" id="hero-packages"></a>
          <a class="btn btn-secondary" href="menu.html" id="hero-menu"></a>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <h2 class="section-title" id="home-sections-title"></h2>
        <div class="features-grid" id="home-sections"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer" data-footer></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="assets/js/app.js"></script>

  <script type="module">
    import { t } from "./assets/js/i18n.js";
    import { renderHome } from "./assets/js/renderers.js";

    document.querySelector("#hero-badge").textContent = t("heroBadge");
    document.querySelector("#hero-title").textContent = t("homeHeroTitle");
    document.querySelector("#hero-text").textContent = t("homeHeroText");
    document.querySelector("#hero-packages").textContent = t("ctaPackages");
    document.querySelector("#hero-menu").textContent = t("ctaMenu");
    document.querySelector("#home-sections-title").textContent = t("introCardsTitle");

    renderHome();
  </script>
</body>
</html>
