<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menü | Miss Catering</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-title="Menü">
  <header class="site-header" data-header></header>

  <main class="page-shell">
    <div class="container">
      <h1 class="page-title">Menü</h1>

      <section class="menu-section">
        <h2>Fingerfood</h2>
        <div class="menu-grid" id="fingerfood-grid"></div>
      </section>

      <section class="menu-section">
        <h2>Vorspeisen</h2>
        <div class="menu-grid" id="starters-grid"></div>
      </section>

      <section class="menu-section">
        <h2>Hauptgerichte</h2>
        <div class="menu-grid" id="mains-grid"></div>
      </section>

      <section class="menu-section">
        <h2>Desserts</h2>
        <div class="menu-grid" id="desserts-grid"></div>
      </section>
    </div>
  </main>

  <footer class="site-footer" data-footer></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="assets/js/app.js"></script>

  <script type="module">
    import { loadSiteData, pickLang, money } from "./assets/js/data.js";

    const data = await loadSiteData();
    const catalog = data.catalog || {};

    function renderMenuItems(items, targetId) {
      const target = document.getElementById(targetId);
      target.innerHTML = (items || []).map(item => `
        <article class="menu-card">
          <h3>${pickLang(item.name)}</h3>
          <p class="menu-price">${money(Number(item.price || 0))} pro ${item.unit || "Portion"}</p>
        </article>
      `).join("");
    }

    renderMenuItems(catalog.fingerfood, "fingerfood-grid");
    renderMenuItems(catalog.starters, "starters-grid");
    renderMenuItems(catalog.mains, "mains-grid");
    renderMenuItems(catalog.desserts, "desserts-grid");
  </script>
</body>
</html>
