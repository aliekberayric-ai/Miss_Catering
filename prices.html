<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preislisten | Miss Catering</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-title="Preisliste">

<header class="site-header" data-header></header>

<main class="page-shell">
  <div class="container">
    <h1 class="page-title">Preislisten</h1>
    <div class="grid" id="price-grid"></div>
  </div>
</main>

<footer class="site-footer" data-footer></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="assets/js/app.js"></script>

<script type="module">
  import { loadSiteData, pickLang, money } from "./assets/js/data.js";

  const data = await loadSiteData();

  const grid = document.getElementById("price-grid");

  grid.innerHTML = data.priceLists.map(item => `
    <div class="card">
      <h3>${pickLang(item.title)}</h3>
      <p>${money(item.price)} pro ${item.unit}</p>
    </div>
  `).join("");
</script>

</body>
</html>
