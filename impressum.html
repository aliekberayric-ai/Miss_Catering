<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impressum | Miss Catering</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-title="Impressum">
  <header class="site-header" data-header></header>

  <main class="page-shell">
    <div class="container">
      <h1 class="page-title">Impressum</h1>
      <section class="content-card" id="impressum-box"></section>
    </div>
  </main>

  <footer class="site-footer" data-footer></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="assets/js/app.js"></script>

  <script type="module">
    import { loadSiteData } from "./assets/js/data.js";

    const data = await loadSiteData();
    const imp = data.impressum || {};

    document.querySelector("#impressum-box").innerHTML = `
      <h3>${imp.company || ""}</h3>
      <p>
        ${imp.owner || ""}<br>
        ${imp.street || ""}<br>
        ${imp.city || ""}
      </p>
      <p>
        E-Mail: ${imp.mail || ""}<br>
        Telefon: ${imp.phone || ""}
      </p>
    `;
  </script>
</body>
</html>
