<!doctype html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body data-title="Admin Login">
  <header class="site-header" data-header></header>
  <main class="page-shell">
    <div class="container">
      <div class="admin-box">
        <h1 class="page-title" id="page-title"></h1>
        <p class="notice" id="login-info"></p>
        <form id="login-form" class="form-grid"><input class="input" type="email" name="email" placeholder="E-Mail"
            required><input class="input" type="password" name="password" placeholder="Passwort" required><button
            class="btn btn-primary" type="submit">Login</button>
          <p id="login-message"></p>
        </form>
      </div>
    </div>
  </main>
  <footer class="site-footer" data-footer></footer>
  <script type="module" src="assets/js/app.js"></script>
  <script type="module" src="assets/js/login.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase//supabase-js@2"></script><script type="module" src="./assets/js/login.js"></script>
</body>

</html>
